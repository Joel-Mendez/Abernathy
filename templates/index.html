<!DOCTYPE html>
<html>
<head>
    <title>Abernathy</title>
</head>
<body>
    <h1>Message from Python backend</h1>
    <p id="hello_message"></p>
    <script>
        fetch("/greeting")
        .then(response => response.json()) 
        .then(data => {
            document.getElementById("hello_message").textContent = data.message;
        });
    </script>
</body>
</html>
