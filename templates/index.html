<!DOCTYPE html>
<html>
    <head>
        <title> Abernathy </title>
        <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
        <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap">
    </head>
    <body>
        <div id="layout">
            <div id="sidebar">
                <button id="tab-tasks" class="active" onclick="switchTab('tasks')"><i class="fa-solid fa-square-check"></i></button>
                <button id="tab-projects" onclick="switchTab('projects')"><i class="fa-solid fa-folder"></i></button>
                <button id="tab-progress" onclick="switchTab('progress')"><i class="fa-solid fa-chart-line"></i></button>
            </div>
            <div id="content">
                <h1 id="tab-title">Tasks</h1>
                <button id="back-btn" style="display:none" onclick="goBackToProjects()"><i class="fa-solid fa-arrow-left"></i></button>
                <div id="view-toggle" style="display:none">
                    <button class="view-btn active" id="view-all" onclick="setTaskView('all')">All Tasks</button>
                    <button class="view-btn" id="view-priority" onclick="setTaskView('priority')">Priority</button>
                    <button class="view-btn" id="view-project" onclick="setTaskView('project')">Project</button>
                    <button class="view-btn" id="view-duedate" onclick="setTaskView('duedate')">Due Date</button>
                    <button class="view-btn" id="view-status" onclick="setTaskView('status')">Status</button>
                    <button class="view-btn" id="view-descendants" onclick="setTaskView('descendants')">Descendants</button>
                    <button class="view-btn" id="view-effort" onclick="setTaskView('effort')">Effort</button>
                    <button class="view-btn" id="view-progress" style="display:none" onclick="setTaskView('progress')">Progress</button>
                </div>
                <ul id="task-list"></ul>
            </div>
        </div>
        <div id="add-task">
            <input type="text" id="input" placeholder="Task name ...">
            <button type="button" onclick="sendInput()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        <button id="add-btn" onclick="toggleAddForm()"><i class="fa-solid fa-plus"></i></button>
        <div id="task-modal-overlay" onclick="closeTaskModal()">
            <div id="task-modal" onclick="event.stopPropagation()">
                <button id="task-modal-close" onclick="closeTaskModal()"><i class="fa-solid fa-xmark"></i></button>
                <div id="task-modal-content"></div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='app.js') }}"></script>
    </body>
</html>
