<!DOCTYPE html>
<html>
<head>
    <title>Abernathy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inconsolata', monospace;
            font-size: 16px;
            line-height: 1.5;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
    </style>
</head>
<body>
    <h1>Add a Task</h1>
    <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Enter a task..." required />
        <button type="submit">Save Task</button>
    </form>

    <h2>To-Do List</h2>
    <ul id="taskList"></ul>

    <script>
        fetch("/get_tasks")
            .then(response => response.json())
            .then(data => {
                const taskList = document.getElementById("taskList");
                data.tasks.forEach(task => {
                    const li = document.createElement("li");
                    // li.textContent = `${task.name} — ${task.status}`;
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = task.status === "complete";

                    // Update backend when checkbox is clicked
                    checkbox.addEventListener("change", () => {
                        fetch("/update_status", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ task: task.name, status: checkbox.checked ? "complete" : "not started" })
                        });
                    });

                    li.appendChild(checkbox);
                    li.appendChild(document.createTextNode(` ${task.name}`));
                    taskList.appendChild(li);
                });
            });

        document.getElementById("taskForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const task = document.getElementById("taskInput").value;

            fetch("/add_task", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ task: task })
            }).then(response => response.json())
              .then(data => {
                  alert(data.message);
                  document.getElementById("taskInput").value = "";
                //   const li = document.createElement("li");
                //   li.textContent = `${task} — not started`;
                //   document.getElementById("taskList").appendChild(li);
                const li = document.createElement("li");
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = false;

                const label = document.createElement("span");
                label.textContent = `${task}`;

                checkbox.addEventListener("change", function () {
                    fetch("/update_status", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            task: task,
                            status: checkbox.checked ? "complete" : "not started"
                        })
                    });
                });

                li.appendChild(checkbox);
                li.appendChild(label);
                document.getElementById("taskList").appendChild(li);
                  document.getElementById("taskInput").value = "";
              });
        });
    </script>
</body>
</html>
