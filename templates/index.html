<!DOCTYPE html>
<html>
    <head>
        <title> Abernathy </title>
        <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
        <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap">
    </head>
    <body>
        <div id="layout">
            <div id="sidebar">
                <button id="tab-tasks" class="active" onclick="switchTab('tasks')"><i class="fa-solid fa-square-check"></i></button>
                <button id="tab-projects" onclick="switchTab('projects')"><i class="fa-solid fa-folder"></i></button>
                <button id="tab-calendar" onclick="switchTab('calendar')"><i class="fa-solid fa-calendar"></i></button>
                <button id="tab-progress" onclick="switchTab('progress')"><i class="fa-solid fa-chart-line"></i></button>
            </div>
            <div id="content">
                <h1 id="tab-title">Tasks</h1>
                <button id="back-btn" style="display:none" onclick="goBackToProjects()"><i class="fa-solid fa-arrow-left"></i></button>
                <div id="sort-menu-wrap" style="display:none">
                    <button id="sort-btn" onclick="toggleSortMenu()">
                        <i class="fa-solid fa-arrow-up-wide-short"></i>
                        <span id="sort-label">All Tasks</span>
                    </button>
                    <div id="sort-menu" style="display:none">
                        <div class="sort-option active" data-view="all"         onclick="setTaskView('all')">All Tasks</div>
                        <div class="sort-option"        data-view="priority"    onclick="setTaskView('priority')">Priority</div>
                        <div class="sort-option"        data-view="project"     id="sort-option-project" onclick="setTaskView('project')">Project</div>
                        <div class="sort-option"        data-view="duedate"     onclick="setTaskView('duedate')">Due Date</div>
                        <div class="sort-option"        data-view="status"      onclick="setTaskView('status')">Status</div>
                        <div class="sort-option"        data-view="descendants" onclick="setTaskView('descendants')">Descendants</div>
                        <div class="sort-option"        data-view="effort"      onclick="setTaskView('effort')">Effort</div>
                        <div class="sort-option"        data-view="pressure"    onclick="setTaskView('pressure')">Pressure</div>
                        <div class="sort-option"        data-view="tree"        onclick="setTaskView('tree')">Tree</div>
                        <div class="sort-option"        data-view="sandbox"     onclick="setTaskView('sandbox')">Sandbox</div>
                        <div class="sort-option"        data-view="progress"    id="sort-option-progress" style="display:none" onclick="setTaskView('progress')">Progress</div>
                    </div>
                </div>
                <ul id="task-list"></ul>
            </div>
        </div>
        <div id="add-task">
            <input type="text" id="input" placeholder="Task name ...">
            <button type="button" onclick="sendInput()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        <button id="add-btn" onclick="toggleAddForm()"><i class="fa-solid fa-plus"></i></button>
        <div id="overdue-modal-overlay" onclick="closeOverdueModal()">
            <div id="overdue-modal" onclick="event.stopPropagation()">
                <button class="overdue-modal-close" onclick="closeOverdueModal()"><i class="fa-solid fa-xmark"></i></button>
                <div id="overdue-modal-content"></div>
            </div>
        </div>
        <div id="task-modal-overlay" onclick="closeTaskModal()">
            <div id="task-modal" onclick="event.stopPropagation()">
                <button id="task-modal-close" onclick="closeTaskModal()"><i class="fa-solid fa-xmark"></i></button>
                <div id="task-modal-content"></div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='app.js') }}"></script>
    </body>
</html>
