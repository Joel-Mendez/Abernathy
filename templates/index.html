<!DOCTYPE html>
<html>
<head>
    <title>Abernathy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inconsolata', monospace;
            font-size: 16px;
            line-height: 1.5;
            padding-left: 26px; 
        }
        h2 {
            margin-bottom: 0px;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 0px;
        }
        #addTaskBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            font-size: 32px;        
            border: none;
            border-radius: 50%;
            background-color: #000000;
            color: white;
            cursor: pointer;
        }

        .task-item i {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: #bbb;
            font-size: 14px;
            margin-left: 8px;
        }

        .task-item:hover i {
            visibility: visible;
            opacity: 1;
        }

        #viewToggle {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        #viewToggle button {
            font-family: 'Inconsolata', monospace;
            font-size: 14px;
            margin-right: 10px;
            padding: 6px 12px;
            cursor: pointer;
            border: 1px solid #000;
            background: white;
            color: #000;
        }

        #viewToggle button.active {
            background: #000;
            color: white;
        }
    </style>
</head>
<body>
    <!-- <h1>Add a Task</h1> -->
    <!-- <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Enter a task..." required />
        <button type="submit">Save Task</button>
    </form> -->

    <h2>Tasks</h2>
    <div id="viewToggle">
        <button id="todoBtn">To-Do</button>
        <button id="completedBtn">Completed</button>
    </div>
    <ul id="taskList"></ul>
    <ul id="completedList" style="display: none;"></ul>
    <button id="addTaskBtn">+</button>
    <script>
        fetch("/get_tasks")
            .then(response => response.json())
            .then(data => {
                const taskList = document.getElementById("taskList");
                const completedList = document.getElementById("completedList");

                data.tasks.forEach(task => {
                    const li = document.createElement("li");
                    li.className = "task-item";
                    li.style.display = "flex";
                    li.style.alignItems = "center";
                    li.style.marginBottom = "8px";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = task.status === "complete";
                    checkbox.addEventListener("change", () => {
                        fetch("/update_status", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                task: task.name,
                                status: checkbox.checked ? "complete" : "not started"
                            })
                        }).then(() => location.reload());
                    });

                    const label = document.createElement("span");
                    label.textContent = ` ${task.name}`;
                    label.style.marginLeft = "8px";

                    const editIcon = document.createElement("i");
                    editIcon.className = "fas fa-pencil-alt";
                    editIcon.style.cursor = "pointer";
                    editIcon.style.marginLeft = "12px";
                    editIcon.style.color = "#aaa";
                    editIcon.style.fontSize = "12px";
                    editIcon.title = "Edit";
                    editIcon.addEventListener("click", () => {
                        const newName = prompt("Edit task name:", task.name);
                        if (newName && newName.trim() !== "") {
                            fetch("/edit_task", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ old: task.name, new: newName.trim() })
                            }).then(() => location.reload());
                        }
                    });

                    const trashIcon = document.createElement("i");
                    trashIcon.className = "fas fa-trash";
                    trashIcon.style.cursor = "pointer";
                    trashIcon.style.marginLeft = "12px";
                    trashIcon.style.color = "#aaa";
                    trashIcon.style.fontSize = "12px";
                    trashIcon.title = "Delete";
                    trashIcon.addEventListener("click", () => {
                        if (confirm(`Delete "${task.name}"?`)) {
                            fetch("/delete_task", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ task: task.name })
                            }).then(() => location.reload());
                        }
                    });

                    li.appendChild(checkbox);
                    li.appendChild(label);
                    li.appendChild(editIcon);
                    li.appendChild(trashIcon);

                    if (task.status === "complete") {
                        completedList.appendChild(li);
                    } else {
                        taskList.appendChild(li);
                    }
                });
            });
        
        document.getElementById("todoBtn").addEventListener("click", () => {
            document.getElementById("taskList").style.display = "block";
            document.getElementById("completedList").style.display = "none";
            document.getElementById("todoBtn").classList.add("active");
            document.getElementById("completedBtn").classList.remove("active");
        });

        document.getElementById("completedBtn").addEventListener("click", () => {
            document.getElementById("taskList").style.display = "none";
            document.getElementById("completedList").style.display = "block";
            document.getElementById("completedBtn").classList.add("active");
            document.getElementById("todoBtn").classList.remove("active");
        });

        document.getElementById("addTaskBtn").addEventListener("click", function () {
            const task = prompt("What task would you like to add?");
            if (task && task.trim() !== "") {
                fetch("/add_task", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ task: task.trim() })
                })
                .then(response => response.json())
                .then(data => {
                    const li = document.createElement("li");
                    li.className = "task-item";
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = false;
    
                    const label = document.createElement("span");
                    label.textContent = ` ${task.trim()}`;
    
                    checkbox.addEventListener("change", function () {
                        fetch("/update_status", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                task: task.trim(),
                                status: checkbox.checked ? "complete" : "not started"
                            })
                        });
                    });
    
                    li.appendChild(checkbox);
                    li.appendChild(label);
                    document.getElementById("taskList").appendChild(li);
                });
            }
        });
    </script>
    
</body>
</html>
