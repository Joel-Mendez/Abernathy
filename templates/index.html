<!DOCTYPE html>
<html>
<head>
    <title>Abernathy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inconsolata', monospace;
            font-size: 16px;
            line-height: 1.5;
            padding-left: 26px; 
        }
        h2 {
            margin-bottom: 0px;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 0px;
        }
        #addTaskBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            font-size: 32px;        
            border: none;
            border-radius: 50%;
            background-color: #000000;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- <h1>Add a Task</h1> -->
    <!-- <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Enter a task..." required />
        <button type="submit">Save Task</button>
    </form> -->

    <h2>To-Do</h2>
    <!-- <h2>
        <button id="todoTab">To-Do</button>
        <button id="completedTab">Completed</button>
    </h2> -->
    <ul id="taskList"></ul>
    <button id="addTaskBtn">+</button>
    <script>
        fetch("/get_tasks")
            .then(response => response.json())
            .then(data => {
                const taskList = document.getElementById("taskList");
                data.tasks
                    .filter(task => task.status !== "complete")
                    .forEach(task => {
                        const li = document.createElement("li");
                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.checked = task.status === "complete";
    
                        checkbox.addEventListener("change", () => {
                            fetch("/update_status", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({
                                    task: task.name,
                                    status: checkbox.checked ? "complete" : "not started"
                                })
                            });
                        });
    
                        li.appendChild(checkbox);
                        li.appendChild(document.createTextNode(` ${task.name}`));
                        taskList.appendChild(li);
                    });
            });
    
        document.getElementById("addTaskBtn").addEventListener("click", function () {
            const task = prompt("What task would you like to add?");
            if (task && task.trim() !== "") {
                fetch("/add_task", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ task: task.trim() })
                })
                .then(response => response.json())
                .then(data => {
                    const li = document.createElement("li");
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = false;
    
                    const label = document.createElement("span");
                    label.textContent = ` ${task.trim()}`;
    
                    checkbox.addEventListener("change", function () {
                        fetch("/update_status", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                task: task.trim(),
                                status: checkbox.checked ? "complete" : "not started"
                            })
                        });
                    });
    
                    li.appendChild(checkbox);
                    li.appendChild(label);
                    document.getElementById("taskList").appendChild(li);
                });
            }
        });
    </script>
    
</body>
</html>
