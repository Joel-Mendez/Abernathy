<!DOCTYPE html>
<html>
<head>
    <title>Abernathy</title>
</head>
<body>

    <h1>Tasks:</h1>
    <input type="text" id="inputString" placeholder="New task ... ">
    <button onclick="sendMessage()">Add</button>

    <p>Response: <span id="result"></span></p>

    <script>
        function sendMessage() {
            const input = document.getElementById("inputString").value;

            fetch("/reverse", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: input })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").textContent = data.reversed;
            });
        }
    </script>
</body>
</html>
